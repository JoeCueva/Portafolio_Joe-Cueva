<style>:root{--color-principal:#32CD32;--color-secundario:#00FF66;--color-terciario:#0A0A0A;--color-cuartenario:#2E2E2E;--color-quinario:#FFFFFF}html,body{min-height:100vh;display:flex;flex-direction:column;margin:0}body{box-sizing:border-box;margin:0;padding:0;min-height:100vh;background-color:var(--color-terciario);overflow-x:hidden;overflow-y:auto;position:relative}</style><link rel="stylesheet" href="styles-T274ST4L.css" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="styles-T274ST4L.css"></noscript></head>

<body>
  <app-root></app-root>

  <script>
    let body = document.querySelector('body');

    function createParticula(x, y, esMouse = false) {
      let particle = document.createElement('div');
      particle.classList.add('particle');

      particle.style.left = `${x}px`;
      particle.style.top = `${y}px`;

      let rango = esMouse ? 150 : 80;
      let moveX = (Math.random() - 0.5) * rango;
      let moveY = (Math.random() - 0.5) * rango;

      particle.style.setProperty('--move-x', `${moveX}px`);
      particle.style.setProperty('--move-y', `${moveY}px`);

      let size = esMouse
        ? Math.random() * 5 + 2
        : Math.random() * 3 + 1;

      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;

      let duration = Math.random() * 4 + 3;
      particle.style.animationDuration = `${duration}s`;

      body.appendChild(particle);
      setTimeout(() => particle.remove(), duration * 1000);
    }

    setInterval(() => {
      for (let i = 0; i < 5; i++) {
        let x = Math.random() * window.innerWidth;
        let y = Math.random() * window.innerHeight;
        createParticula(x, y, false);
      }
    }, 150);

    document.addEventListener('mousemove', (e) => {
      if (Math.random() < 0.3) {
        createParticula(e.clientX, e.clientY, true);
      }
    });

  </script>
